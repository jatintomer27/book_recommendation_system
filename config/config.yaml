artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  kaggle_dataset: "saurabhbagchi/books-dataset"
  file: ["books.csv", "ratings.csv", "users.csv"]
  local_data_file: [
    "artifacts/data_ingestion/books_data/books.csv", 
    "artifacts/data_ingestion/books_data/ratings.csv", 
    "artifacts/data_ingestion/books_data/users.csv"
  ]
  data_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  files: ["books.csv", "ratings.csv", "users.csv"]
  data_dir: artifacts/data_ingestion/books_data
  status_file: "artifacts/data_validation/status.txt"
  status_message_file: "artifacts/data_validation/status_message.txt"

data_transformation:
  root_dir: artifacts/data_transformation
  local_data_file: [
    "artifacts/data_ingestion/books_data/books.csv", 
    "artifacts/data_ingestion/books_data/ratings.csv", 
    # "artifacts/data_ingestion/books_data/users.csv"
  ]
  processed_data_path: artifacts/data_transformation
  final_books_data: artifacts/data_transformation/books.csv
  book_pivot_serial_object: artifacts/data_transformation/book_pivot.pkl
  book_names_serial_object: artifacts/data_transformation/book_names.pkl
  book_sparse_serial_object: artifacts/data_transformation/book_sparse.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/book_sparse.pkl
  trained_model_name: artifacts/model_trainer/model.pkl

